<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="slider" id="slider">

            <div class="form signin"><br><br><br><br>
                <img src="images/logo.png" alt="logo" class="logo" width="80">
                <h2>Sign up</h2>

                <input type="text" placeholder="Last name" required>
                <input type="text" placeholder="First name" required>
                <input type="text" placeholder="Middle name" required>
                <input type="date" placeholder="Date of birth" required>
                <label for="">Gender</label><br>
                <select name="Gender" placeholder="Gender" required>
                    <option value="hiden"></option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select><br>
                <input type="username" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm password" required>
            
            <button>Sign up</button>
            <p> Already have an account?
                <a href="login.html">Log in</a>
            </p><br>

            </div>
        </div>
    </div>
</body>
</html>
